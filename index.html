<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a0a1a">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>AI精灵手办</title>
  <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.145.0/examples/js/loaders/GLTFLoader.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0a1a;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;position:fixed;top:0;left:0;width:100vw;height:100vh;touch-action:manipulation;}
    canvas{position:fixed;top:0;left:0;z-index:1;}
    #status{position:fixed;top:20px;width:100%;text-align:center;color:#fff;font-size:14px;z-index:10;pointer-events:none;}
    #btns{position:fixed;bottom:30px;left:0;right:0;display:flex;justify-content:center;gap:10px;z-index:10;flex-wrap:wrap;}
    .btn{padding:12px 20px;border-radius:25px;font-size:13px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);cursor:pointer;white-space:nowrap;backdrop-filter:blur(8px);}
    .btn:active{background:rgba(255,255,255,0.3);}
    .btn.active{background:rgba(0,200,100,0.4);border-color:#0f0;}
    #fileInput{display:none;}
    #bubble{position:fixed;bottom:120px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;z-index:20;pointer-events:none;opacity:0;transition:opacity 0.3s;}
    #bubble.show{opacity:1;}
  </style>
</head>
<body>
  <div id="status">✨ 上传手机壳照片，生成专属精灵</div>
  <div id="btns">
    <input type="file" id="fileInput" accept="image/*">
    <button class="btn" id="uploadBtn">📷 上传照片</button>
    <button class="btn" id="voiceBtn">🎤 开始对话</button>
    <button class="btn" id="fortuneBtn">🔮 运势</button>
    <button class="btn" id="weatherBtn">🌤 天气</button>
    <button class="btn" id="refreshBtn">🔄 换形象</button>
  </div>
  <div id="bubble"></div>
  <audio id="audioPlayer" hidden></audio>

  <script>
    // ⚠️ 替换为你的 Vercel 后端地址
    const API = 'const API = "https://project-xene3-fengs-projects-6057f262.vercel.app/";

    const STYLE_NAMES = ['甜心萝莉','高冷御姐','清冷少年','阳光元气','神秘精灵','古风雅韵','梦幻童话'];
    const HAIRCOLORS = ['#ffb8c6','#88aadd','#d4a5f5','#ffd080','#c8d8e8','#ffe0e0','#b0c4de','#f0c8d0','#a8d8ea','#e8c8f0','#ffe8b0','#d0d8f0'];

    let scene, camera, renderer, stars, elfGroup, elfParts, gltfLoader;
    let currentStyle = null, listening = false, recognition = null;

    // ---- 初始化场景 ----
    scene = new THREE.Scene();
    camera = new THREE.PerspectiveCamera(42, innerWidth/innerHeight, 0.1, 200);
    renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0x0a0a1a, 1);
    document.body.appendChild(renderer.domElement);
    camera.position.set(0, 1.2, 9);
    scene.add(new THREE.AmbientLight(0x8899cc, 1.3));
    const keyL = new THREE.DirectionalLight(0xffffff, 2.5);
    keyL.position.set(4,6,8); scene.add(keyL);
    scene.add(new THREE.DirectionalLight(0xaaccff,1).position.set(-3,1,5));
    scene.add(new THREE.DirectionalLight(0xffddee,1.2).position.set(0,3,-5));

    // 底座与光环
    const baseGeo = new THREE.CylinderGeometry(0.9,1.1,0.25,48);
    const base = new THREE.Mesh(baseGeo, new THREE.MeshToonMaterial({color:0x3a3a5a}));
    base.position.y = -2.4; scene.add(base);
    const ringGeo = new THREE.TorusGeometry(0.75,0.03,16,64);
    const ring = new THREE.Mesh(ringGeo, new THREE.MeshBasicMaterial({color:0xffddaa,transparent:true,opacity:0.5}));
    ring.position.y = -2.22; ring.rotation.x = -Math.PI/2; scene.add(ring);

    // 星空
    const sGeo = new THREE.BufferGeometry();
    const sPos = new Float32Array(600*3);
    for(let i=0;i<600;i++){sPos[i*3]=(Math.random()-0.5)*28;sPos[i*3+1]=(Math.random()-0.5)*18;sPos[i*3+2]=-3-Math.random()*12;}
    sGeo.setAttribute('position', new THREE.BufferAttribute(sPos,3));
    stars = new THREE.Points(sGeo, new THREE.PointsMaterial({color:0x88aadd,size:0.025,transparent:true,opacity:0.7,blending:THREE.AdditiveBlending,depthWrite:false}));
    scene.add(stars);

    gltfLoader = new THREE.GLTFLoader();

    // ---- 创建程序化精灵（秒出，混元3D生成前展示）----
    function createProceduralElf(style) {
      if(elfGroup) { scene.remove(elfGroup); /* 自行补充dispose */ }
      elfGroup = new THREE.Group();
      elfParts = {};
      const clothMat = new THREE.MeshToonMaterial({color: style.clothColor || '#8899cc'});
      const hairMat = new THREE.MeshToonMaterial({color: style.hairColor || '#ffb8c6'});
      // 身体
      const body = new THREE.Mesh(new THREE.SphereGeometry(0.5,36,28).scale(1,0.65,0.6), clothMat);
      body.position.y = -0.9; elfGroup.add(body);
      // 头部
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.65,44,36), new THREE.MeshToonMaterial({color:0xffeedd}));
      head.position.y = 0.25; elfGroup.add(head);
      // 眼睛
      const eyeGeo = new THREE.SphereGeometry(0.1,18,14).scale(1,1.2,0.5);
      const eyeMat = new THREE.MeshToonMaterial({color:0x1a1a2a});
      new THREE.Mesh(eyeGeo, eyeMat).position.set(-0.19,0.33,0.58); elfGroup.add(leye);
      new THREE.Mesh(eyeGeo, eyeMat.clone()).position.set(0.19,0.33,0.58); elfGroup.add(reye);
      // 头发
      const mainHair = new THREE.Mesh(new THREE.SphereGeometry(0.68,40,30).scale(1,0.65,0.95), hairMat);
      mainHair.position.set(0,0.42,-0.1); elfGroup.add(mainHair);
      const bangs = new THREE.Mesh(new THREE.SphereGeometry(0.48,22,14).scale(1.1,0.3,0.5), hairMat);
      bangs.position.set(0,0.82,0.4); elfGroup.add(bangs);
      // 光环
      const halo = new THREE.Mesh(new THREE.TorusGeometry(0.3,0.04,14,44), new THREE.MeshToonMaterial({color:0xffe8a0,emissive:0xffd080,emissiveIntensity:0.5,transparent:true,opacity:0.8}));
      halo.position.y = 1.15; halo.rotation.x = Math.PI/2.5; elfGroup.add(halo); elfParts.halo = halo;
      // 翅膀
      if(style.wingType === 'fairy'){
        const wGeo = new THREE.SphereGeometry(0.28,14,10).scale(0.16,0.65,0.45);
        const wMat = new THREE.MeshToonMaterial({color:0xaaddff,transparent:true,opacity:0.5});
        new THREE.Mesh(wGeo, wMat).position.set(-0.5,-0.18,-0.38).rotation.set(0.25,0,0); elfGroup.add(wL);
        new THREE.Mesh(wGeo, wMat).position.set(0.5,-0.18,-0.38).rotation.set(-0.25,0,0); elfGroup.add(wR);
      }
      // 飘带
      const ribGeo = new THREE.CylinderGeometry(0.028,0.045,0.55,8).scale(1,1,0.22);
      const ribMat = new THREE.MeshToonMaterial({color:0xffccdd,transparent:true,opacity:0.55});
      elfParts.ribbons = [];
      [-0.34,0.34].forEach((x,i)=>{
        const rib = new THREE.Mesh(ribGeo, ribMat); rib.position.set(x,-0.68,-0.18); rib.rotation.z = (i===0?0.38:-0.38);
        elfGroup.add(rib); elfParts.ribbons.push(rib);
      });
      elfGroup.position.y = -0.15;
      elfGroup.scale.set(0.82,0.82,0.82);
      scene.add(elfGroup);
    }

    // ---- 加载混元3D生成的GLB模型 ----
    function loadGLBModel(url) {
      if(elfGroup) { scene.remove(elfGroup); }
      gltfLoader.load(url, gltf => {
        elfGroup = gltf.scene;
        elfGroup.scale.set(0.8,0.8,0.8);
        elfGroup.position.y = -0.25;
        scene.add(elfGroup);
        document.getElementById('status').textContent = '✅ 高级精灵已生成';
        speak('我的新形象好看吗？', currentStyle?.name);
      }, undefined, err => {
        document.getElementById('status').textContent = '模型加载失败';
      });
    }

    // ---- 语音合成（优先讯飞TTS，降级浏览器） ----
    function speak(text, style) {
      const audio = document.getElementById('audioPlayer');
      fetch(`${API}/tts?text=${encodeURIComponent(text)}&style=${style}`)
        .then(r => r.json())
        .then(d => {
          if(d.audioUrl) { audio.src = d.audioUrl; audio.play().catch(()=>{}); return; }
          const u = new SpeechSynthesisUtterance(text);
          u.lang='zh-CN'; u.rate=0.9; u.pitch= style==='甜心萝莉'?1.3:1.0;
          speechSynthesis.cancel(); speechSynthesis.speak(u);
        });
    }

    // ---- 语音识别 ----
    function toggleListen() {
      if(listening) { stopListen(); return; }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if(!SR) return alert('请用Chrome打开');
      listening = true;
      document.getElementById('voiceBtn').classList.add('active');
      document.getElementById('voiceBtn').textContent = '🔴 聆听中';
      recognition = new SR();
      recognition.lang = 'zh-CN'; recognition.continuous = true;
      recognition.onresult = async e => {
        const said = e.results[e.results.length-1][0].transcript.trim();
        if(!said) return;
        const bubble = document.getElementById('bubble');
        bubble.textContent = '💬 ' + said;
        bubble.classList.add('show');
        setTimeout(()=>bubble.classList.remove('show'),2000);
        if(said.includes('运势')){
          const r = await fetch(API+'/fortune'); const d = await r.json();
          speak(d.text, currentStyle?.name);
        } else if(said.includes('天气')){
          const r = await fetch(API+'/weather'); const d = await r.json();
          speak(`外面${d.text}，温度${d.temp}度`, currentStyle?.name);
        } else if(said.includes('换形象')){
          handleRefresh();
        } else {
          const r = await fetch(API+'/ai-chat',{
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({message:said, style:currentStyle?.name})
          });
          const d = await r.json();
          speak(d.reply, currentStyle?.name);
        }
      };
      recognition.onerror = () => { if(listening) setTimeout(()=>{try{recognition.start();}catch(e){}},500); };
      recognition.onend = () => { if(listening) setTimeout(()=>{try{recognition.start();}catch(e){}},300); };
      recognition.start();
    }
    function stopListen() {
      listening = false;
      document.getElementById('voiceBtn').classList.remove('active');
      document.getElementById('voiceBtn').textContent = '🎤 开始对话';
      if(recognition) { recognition.onend=null; recognition.abort(); }
    }

    // ---- 上传生成 ----
    async function handleUpload(file) {
      document.getElementById('status').textContent = '🔍 分析风格...';
      const style = {
        name: STYLE_NAMES[Math.floor(Math.random()*7)],
        hairColor: HAIRCOLORS[Math.floor(Math.random()*12)],
        clothColor: '#8899cc', wingType: 'fairy'
      };
      currentStyle = style;
      createProceduralElf(style);
      document.getElementById('status').textContent = '🎨 混元3D精雕中...';

      const form = new FormData(); form.append('photo', file);
      const res1 = await fetch(API+'/generate-elf',{method:'POST',body:form});
      const d1 = await res1.json();
      if(!d1.success) { document.getElementById('status').textContent = d1.error; return; }

      let modelUrl = null;
      for(let i=0;i<30;i++){
        await new Promise(r=>setTimeout(r,3000));
        document.getElementById('status').textContent = `🎨 混元3D精雕中...(${i+1}/30)`;
        const res2 = await fetch(API+'/check-job?jobId='+d1.jobId);
        const d2 = await res2.json();
        if(d2.status==='SUCCESS'){ modelUrl = d2.modelUrl; currentStyle = d2.persona; break; }
        if(d2.status==='FAILED') break;
      }
      if(modelUrl) {
        loadGLBModel(modelUrl);
      } else {
        document.getElementById('status').textContent = '⚠️ 高级模型暂不可用，使用备用精灵';
        speak('暂时只能这样啦，刷新再试试', currentStyle?.name);
      }
    }

    function handleRefresh() {
      const style = {
        name: STYLE_NAMES[Math.floor(Math.random()*7)],
        hairColor: HAIRCOLORS[Math.floor(Math.random()*12)],
        clothColor: '#88aaee', wingType: 'fairy'
      };
      currentStyle = style;
      createProceduralElf(style);
      document.getElementById('status').textContent = '🔄 ' + style.name;
      speak('新形象！', style.name);
    }

    // 事件绑定
    document.getElementById('uploadBtn').onclick = ()=>document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = e=>{const f=e.target.files[0]; if(f) handleUpload(f);};
    document.getElementById('voiceBtn').onclick = toggleListen;
    document.getElementById('fortuneBtn').onclick = ()=>fetch(API+'/fortune').then(r=>r.json()).then(d=>speak(d.text,currentStyle?.name));
    document.getElementById('weatherBtn').onclick = ()=>fetch(API+'/weather').then(r=>r.json()).then(d=>speak(`外面${d.text}，${d.temp}度`,currentStyle?.name));
    document.getElementById('refreshBtn').onclick = handleRefresh;

    // 初始精灵
    setTimeout(handleRefresh,400);

    // 动画循环
    function animate(){
      requestAnimationFrame(animate);
      if(elfGroup){
        elfGroup.rotation.y += 0.005;
        elfGroup.position.y = Math.sin(Date.now()*0.002)*0.1 -0.15;
        if(elfParts.halo) elfParts.halo.rotation.z += 0.01;
        if(elfParts.ribbons) elfParts.ribbons.forEach((r,i)=>r.rotation.z = (i===0?1:-1)*(0.38+Math.sin(Date.now()*0.004)*0.1));
      }
      stars.rotation.y += 0.0003;
      ring.rotation.z += 0.005;
      renderer.render(scene, camera);
    }
    animate();
    window.onresize = ()=>{ camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); };
    speechSynthesis?.getVoices();
  </script>
</body>
</html>
